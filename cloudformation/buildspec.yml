version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing cfn-lint..."
      - pip install cfn-lint

  build:
    commands:
      - echo "Running cfn-lint on template..."
      - cfn-lint cloudformation/infrastructure.yaml -i W
      - echo "cfn-lint PASSED"

  post_build:
    commands:
      - echo "Build stage completed successfully"

artifacts:
  files:
    - cloudformation/infrastructure.yaml
  discard-paths: no
